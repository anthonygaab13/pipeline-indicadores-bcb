name: Atualizar dados

on:
  schedule:
    - cron: "0 6 * * 1" # toda segunda-feira às 06:00 UTC
  workflow_dispatch: {} # permite rodar manualmente pela aba Actions

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -e .

      - name: Rodar pipeline (bronze -> silver -> gold)
        run: python -m bcb_pipeline.run_pipeline

      - name: Exportar dados para o dashboard (dashboard/public/data)
        run: python -m bcb_pipeline.export_json

      - name: Commitar dados atualizados, se houver mudança
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/public/data/
          git diff --cached --quiet || git commit -m "Atualiza dados dos indicadores (execução automática)"
          git push
